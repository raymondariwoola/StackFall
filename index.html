<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#12172B">
<title>StackFall</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2312172B'/><rect x='7' y='6' width='18' height='5' rx='1.5' fill='%23FF9457'/><rect x='6' y='13' width='20' height='5' rx='1.5' fill='%235EE6D6'/><rect x='8' y='20' width='16' height='5' rx='1.5' fill='%23E8A33D'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div id="game-wrap">
  <canvas id="c"></canvas>

  <button id="sound-btn" aria-label="Toggle sound">🔊</button>

  <div id="hud">
    <div id="score">0</div>
    <div id="combo">Combo ×2</div>
    <div id="best-chip">Best: 0</div>
  </div>

  <div id="restart-hint">Tap anywhere to try again</div>

  <div id="overlay" class="show">
    <div class="panel">
      <div class="eyebrow">Precision Build</div>
      <h1>StackFall</h1>
      <div class="sub">Tap to drop each floor. Land it clean.</div>
      <button id="start-btn">Start</button>
      <button id="mode-btn" class="ghost-btn">Endless</button>
      <div class="lb" id="lb-block">
        <div class="lb-title">Top Scores</div>
        <div id="lb-list"></div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
