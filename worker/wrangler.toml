name = "stackfall-lb"
main = "src/index.js"
compatibility_date = "2024-11-01"

# --- KV storage ---------------------------------------------------------------
# Still used for per-IP rate-limit counters, and as the leaderboard fallback if
# the Durable Object below is ever removed. Create the namespace once, then paste
# its id below (see README, step B2):
#  npx wrangler kv namespace create LEADERBOARD
[[kv_namespaces]]
binding = "LEADERBOARD"
id = "c1a7179f0c6d4ed497bdb5c88f8885e8"

# --- Durable Object: serialized leaderboard writes ----------------------------
# Board reads/writes go through one Durable Object per board, whose input gates
# serialize concurrent submissions so no score is ever lost (fixes the KV
# read-modify-write race). SQLite-backed, so it works on the Workers free plan.
# The Worker falls back to KV automatically if this binding is absent.
# Deploy the migration with:  npx wrangler deploy
[[durable_objects.bindings]]
name = "LEADERBOARD_DO"
class_name = "Leaderboard"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Leaderboard"]

# --- Tunables (safe to leave as-is) ------------------------------------------
[vars]
# Must match the salt in js/leaderboard.js (signPayload). Not a real secret.
SIGN_SALT = "stackfall"
# Locked to the live GitHub Pages origin. Accepts a comma-separated allowlist —
# the Worker echoes the caller's Origin only when it matches. To develop against
# the deployed Worker, temporarily append your dev origin, e.g.:
#   ALLOW_ORIGIN = "https://raymondariwoola.github.io,http://127.0.0.1:8137"
# Set back to "*" only if you intentionally want an open API.
ALLOW_ORIGIN = "https://raymondariwoola.github.io"
# Reject implausible scores server-side.
MAX_SCORE = "100000"
# Per-IP rate limits over a rolling 60s window (soft, KV-backed).
# SCORE_RATE_LIMIT bounds score spam; CHEAT_RATE_LIMIT throttles passphrase guesses.
SCORE_RATE_LIMIT = "30"
CHEAT_RATE_LIMIT = "5"
# How many past days a daily board (`/leaderboard?daily=1&day=YYYY-MM-DD`) may be
# queried. 0 = today only. Anything outside a strict YYYY-MM-DD in this window is rejected.
RETENTION_DAYS = "7"
# Keep cheated runs off the GLOBAL leaderboard. "1" = block (default),
# "0" = allow cheated scores onto the board. (They always stay on the
# player's local "Your Best Runs" board regardless.)
# Set to "1" now that the cheat menu is reachable in-game — otherwise a cheated
# run could top a real board.
BLOCK_CHEATED = "1"

# Secret cheat-menu passphrase. For real secrecy, DON'T put it here (this file
# is committed) — instead run:  npx wrangler secret put CHEAT_CODE
# A secret set that way overrides this var. Leave unset/empty to disable cheats.
# CHEAT_CODE = "change-me"
