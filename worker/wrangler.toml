name = "stackfall-lb"
main = "src/index.js"
compatibility_date = "2024-11-01"

# --- KV leaderboard storage ---------------------------------------------------
# Create the namespace once, then paste its id below (see README, step B2):
#   npx wrangler kv namespace create LEADERBOARD
[[kv_namespaces]]
binding = "LEADERBOARD"
id = "c1a7179f0c6d4ed497bdb5c88f8885e8"

# --- Tunables (safe to leave as-is) ------------------------------------------
[vars]
# Must match the salt in js/leaderboard.js (signPayload). Not a real secret.
SIGN_SALT = "stackfall"
# Restrict to your site's origin in production, e.g. "https://stackfall.pages.dev"
ALLOW_ORIGIN = "*"
# Reject implausible scores server-side.
MAX_SCORE = "100000"
# Keep cheated runs off the GLOBAL leaderboard. "1" = block (default),
# "0" = allow cheated scores onto the board. (They always stay on the
# player's local "Your Best Runs" board regardless.)
BLOCK_CHEATED = "0"

# Secret cheat-menu passphrase. For real secrecy, DON'T put it here (this file
# is committed) — instead run:  npx wrangler secret put CHEAT_CODE
# A secret set that way overrides this var. Leave unset/empty to disable cheats.
# CHEAT_CODE = "change-me"
